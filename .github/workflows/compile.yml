name: Compile pH-1 Pro Dylib

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Create include directory and headers
        run: |
          mkdir -p include
          
          # Create substrate.h
          cat > include/substrate.h << 'EOF'
          #ifndef SUBSTRATE_H
          #define SUBSTRATE_H
          
          #include <cstddef>
          
          #ifdef __cplusplus
          extern "C" {
          #endif
          
          void MSHookFunction(void *symbol, void *replace, void **result);
          
          #ifdef __cplusplus
          }
          #endif
          
          #endif
          EOF
          
          # Create stdatomic.h fallback
          cat > include/stdatomic.h << 'EOF'
          #ifndef STDATOMIC_H
          #define STDATOMIC_H
          
          #define _Atomic volatile
          
          typedef _Bool atomic_bool;
          
          static inline void atomic_store(volatile _Bool *obj, _Bool value) {
              *obj = value;
          }
          
          static inline _Bool atomic_load(volatile _Bool *obj) {
              return *obj;
          }
          
          #endif
          EOF

      - name: Compile tweak.mm to ph1mlbb.dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos clang++ \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -I./include \
            -fobjc-arc \
            -Wl,-undefined,dynamic_lookup \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -framework ObjectiveC \
            tweak.mm \
            -o ph1mlbb.dylib

      - name: Sign dylib with entitlements
        run: |
          # Create entitlements file
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>platform-application</key>
              <true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
              <true/>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
              <key>com.apple.security.cs.allow-dyld-environment-variables</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          ldid -Sentitlements.plist ph1mlbb.dylib

      - name: Verify dylib architecture
        run: |
          file ph1mlbb.dylib
          otool -L ph1mlbb.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ph1mlbb_dylib
          path: ph1mlbb.dylib
