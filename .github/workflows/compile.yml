# .github/workflows/build.yml

```yaml
name: Compile iOS Dylib

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install ldid
        run: brew install ldid

      - name: Prepare headers
        run: |
          mkdir -p include
          curl -L https://raw.githubusercontent.com/theos/headers/master/substrate.h -o include/substrate.h

      - name: Compile tweak.mm to dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          xcrun -sdk iphoneos clang++ \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -I./include \
            -fobjc-arc \
            -Wl,-undefined,dynamic_lookup \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            tweak.mm \
            -o mlbb_m.dylib

      - name: Sign dylib
        run: ldid -S mlbb_m.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlbb_m_dylib
          path: mlbb_m.dylib