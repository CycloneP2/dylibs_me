name: Compile iOS Dylib

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Prepare substrate header
        run: |
          mkdir -p include
          cat > include/substrate.h << 'EOF'
          #ifndef SUBSTRATE_H
          #define SUBSTRATE_H
          
          #include <cstddef>
          
          #ifdef __cplusplus
          extern "C" {
          #endif
          
          void MSHookFunction(void *symbol, void *replace, void **result);
          
          #ifdef __cplusplus
          }
          #endif
          
          #endif
          EOF

      - name: Compile tweak.mm to dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos clang++ \
            -dynamiclib \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -I./include \
            -fobjc-arc \
            -Wl,-undefined,dynamic_lookup \
            -framework UIKit \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            tweak.mm \
            -o mlbb_m.dylib

      - name: Sign dylib
        run: ldid -S mlbb_m.dylib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlbb_m_dylib
          path: mlbb_m.dylib